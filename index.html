<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>履歴打ちシミュレーター</title>
  <meta name="description" content="履歴打ちシミュレーター初期版">
  <link rel="stylesheet" href="./css/base.css?v=20260719-scroll-anchor">
  <link rel="stylesheet" href="./css/layout.css?v=20260719-scroll-anchor">
  <link rel="stylesheet" href="./css/components.css?v=20260719-scroll-anchor">
  <link rel="stylesheet" href="./css/theme-king-deigo.css?v=20260719-scroll-anchor">
  <link rel="stylesheet" href="./css/responsive.css?v=20260719-scroll-anchor">
</head>
<body>
  <main id="app" class="app-shell" aria-live="polite">
    <section class="screen-panel">
      <div class="section-heading">
        <h1>読み込み中</h1>
      </div>
      <p class="empty-text">
        しばらく待っても画面が変わらない場合は、ページを再読み込みしてください。
      </p>
    </section>
  </main>
  <script>
    window.addEventListener("error", () => {
      const app = document.querySelector("#app");
      if (!app || app.dataset.screen) return;
      app.innerHTML = `
        <section class="screen-panel">
          <div class="section-heading">
            <h1>読み込みに失敗しました</h1>
          </div>
          <p class="empty-text">
            しばらく待っても画面が変わらない場合は、ページを再読み込みしてください。
          </p>
        </section>
      `;
    });
  </script>
  <script type="module" src="./js/app.js?v=20260719-scroll-anchor"></script>
</body>
</html>
